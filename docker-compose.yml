services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: find_that_voice
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres18_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  bot:
    build: .
    command: python -m bot
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/find_that_voice
    depends_on:
      - db
    volumes:
      - .:/app

  admin:
    build: .
    command: sh -c "sleep 5 && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/find_that_voice
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres18_data:
